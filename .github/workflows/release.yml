name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Root tests
        run: go test ./...

      - name: Root race tests
        run: go test -race ./...

      - name: Download validation module dependencies
        working-directory: validation/playground
        env:
          GOWORK: off
        run: go mod download

      - name: Validation submodule tests
        working-directory: validation/playground
        env:
          GOWORK: off
        run: go test ./...

      - name: Download REST API example dependencies
        working-directory: examples/restapi
        env:
          GOWORK: off
        run: go mod download

      - name: REST API example tests
        working-directory: examples/restapi
        env:
          GOWORK: off
        run: go test ./...

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
